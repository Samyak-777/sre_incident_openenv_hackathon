version: "1.0"
name: "sre_incident_env"
description: "Simulates SRE on-call incident response for AI agent evaluation. Agents triage alerts, investigate logs, execute runbooks, and write postmortems."
author:
  name: "Samyak Borkar"
  email: "samyakborkar65@gmail.com"
tasks:
  - id: "task_easy"
    name: "Redis OOM Triage"
    description: "Triage a P2 Redis out-of-memory incident affecting the auth service. Requires log investigation, runbook execution, and postmortem."
    difficulty: "easy"
    grader: "sre_incident_env_hackathon.tasks.task_easy.grader:grade"
  - id: "task_medium"
    name: "Shipping API Lock Contention"
    description: "Investigate a P1 shipping API database lock contention incident. Requires multi-service dependency analysis and escalation."
    difficulty: "medium"
    grader: "sre_incident_env_hackathon.tasks.task_medium.grader:grade"
  - id: "task_hard"
    name: "Payment Cascading Failure"
    description: "Respond to a critical payment API cascading failure with multiple root causes and complex dependency chains."
    difficulty: "hard"
    grader: "sre_incident_env_hackathon.tasks.task_hard.grader:grade"
docker:
  build_context: "."
  dockerfile: "Dockerfile"
  port: 7860
